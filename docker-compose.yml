version: '3.8'

services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    networks:
      - app-network   

  backend:
    build:
      context: ./backend
    restart: always  
    ports:
      - "8000:8000"
    depends_on:
      - postgres  
    networks:
      - app-network  

  frontend:
    build:
      context: ./frontend
    restart: always  
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network  

volumes:
  postgres_data:

networks:
  app-network:

